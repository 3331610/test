<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星云文教馆值班管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #8B7355;
            --primary-dark: #6B5344;
            --primary-light: #A68B6A;
            --bg-color: #FDFCF8;
            --text-color: #4A4A4A;
            --text-light: #8B8680;
            --border-color: #E8E4DC;
            --shadow: 0 4px 20px rgba(107, 83, 68, 0.08);
            --shadow-hover: 0 8px 30px rgba(107, 83, 68, 0.15);
            --fulltime-color: #4A4A4A;
            --halftime-color: #999999;
        }

        body {
            font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", "STSong", serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(139, 115, 85, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(139, 115, 85, 0.03) 0%, transparent 50%);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* 头部区域 */
        .header {
            text-align: center;
            padding: 40px 20px 30px;
            position: relative;
        }

        .dept-selector {
            display: inline-block;
            position: relative;
            margin-bottom: 15px;
        }

        .dept-select {
            appearance: none;
            -webkit-appearance: none;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 12px 40px 12px 25px;
            font-size: 16px;
            color: var(--primary-dark);
            font-family: inherit;
            cursor: pointer;
            box-shadow: var(--shadow);
            min-width: 160px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .dept-select:hover {
            box-shadow: var(--shadow-hover);
            border-color: var(--primary-light);
        }

        .dept-selector::after {
            content: "▼";
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-color);
            font-size: 10px;
            pointer-events: none;
        }

        .subtitle {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 8px;
            letter-spacing: 2px;
        }

        .main-title {
            font-size: 32px;
            font-weight: 400;
            color: var(--primary-dark);
            margin: 25px 0 15px;
            letter-spacing: 4px;
            position: relative;
            display: inline-block;
        }

        .main-title::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
        }

        .motto {
            font-size: 16px;
            color: var(--text-light);
            margin-top: 25px;
            letter-spacing: 3px;
        }

        /* 日历容器 */
        .calendar-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            padding: 15px 0;
            font-size: 14px;
            color: var(--text-light);
            border-bottom: 1px solid var(--border-color);
            font-weight: 500;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            padding: 15px 0;
        }

        .calendar-day {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            min-height: 100px;
            display: flex;
            flex-direction: column;
        }

        .calendar-day:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
            border-color: var(--primary-light);
        }

        .calendar-day.closed {
            background: #F5F5F5;
            cursor: default;
            opacity: 0.7;
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .day-number {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-color);
        }

        .day-label {
            font-size: 11px;
            color: var(--primary-color);
            background: rgba(139, 115, 85, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .staff-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .staff-item {
            font-size: 13px;
            padding: 3px 6px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .staff-item.fulltime { color: var(--fulltime-color); font-weight: 500; background: rgba(139, 115, 85, 0.08); }
        .staff-item.halftime { color: var(--halftime-color); background: rgba(139, 115, 85, 0.04); }

        .staff-time { font-size: 10px; color: var(--text-light); margin-left: auto; }

        .add-hint {
            position: absolute; bottom: 6px; left: 8px; width: 22px; height: 22px;
            background: var(--primary-color); color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; opacity: 0; transition: opacity 0.3s; z-index: 10;
        }

        .calendar-day:hover .add-hint { opacity: 1; }

        /* 统计卡片 */
        .stats-container {
            max-width: 1200px; margin: 30px auto; padding: 0 15px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px;
        }

        .stat-card {
            background: white; border: 1px solid var(--border-color); border-radius: 12px;
            padding: 20px 15px; text-align: center; box-shadow: var(--shadow);
        }

        .stat-value { font-size: 28px; font-weight: 500; color: var(--primary-dark); }

        /* 弹窗样式 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(3px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: white; border-radius: 16px; width: 100%; max-width: 450px;
            max-height: 90vh; overflow: hidden; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header { background: var(--primary-color); color: white; padding: 20px 25px; position: relative; }
        .modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: white; font-size: 24px; cursor: pointer; }

        .modal-body { padding: 25px; overflow-y: auto; }
        .staff-entry { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-color); }
        .delete-btn { color: #ff4444; background: none; border: none; cursor: pointer; font-size: 18px; }

        .text-input { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 15px; }
        .add-btn { width: 100%; padding: 14px; background: var(--primary-color); color: white; border: none; border-radius: 8px; cursor: pointer; }

        .time-option { 
            display: flex; align-items: center; padding: 10px; border: 1px solid var(--border-color); 
            border-radius: 8px; margin-bottom: 8px; cursor: pointer; 
        }
        .time-option.selected { background: rgba(139, 115, 85, 0.1); border-color: var(--primary-color); }

        @media (max-width: 768px) {
            .main-title { font-size: 22px; }
            .calendar-day { min-height: 90px; }
            .staff-time { display: none; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="dept-selector">
            <select class="dept-select" id="deptSelect">
                <option value="香灯组">香灯组</option>
                <option value="美术馆">美术馆</option>
                <option value="图书馆">图书馆</option>
                <option value="非遗组">非遗组</option>
                <option value="大寮">大寮</option>
                <option value="迎宾组">迎宾组</option>
            </select>
        </div>
        <h1 class="main-title">文教馆<span id="deptName">香灯组</span>值班管理</h1>
        <div class="motto">说好话 · 做好事 · 存好心</div>
    </header>

    <div class="month-nav" style="text-align: center; margin-bottom: 20px;">
        <button onclick="changeMonth(-1)" style="padding: 5px 15px;">‹</button>
        <span id="currentMonth" style="margin: 0 20px; font-weight: bold;">2026年4月</span>
        <button onclick="changeMonth(1)" style="padding: 5px 15px;">›</button>
    </div>

    <div class="calendar-container">
        <div class="calendar-header">
            <div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div><div>日</div>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <div style="font-size: 13px; color: #8B8680;">本月值班总人次</div>
            <div class="stat-value" id="totalStaff">0</div>
        </div>
        <div class="stat-card">
            <div style="font-size: 13px; color: #8B8680;">全天</div>
            <div class="stat-value" id="fullDayCount">0</div>
        </div>
        <div class="stat-card">
            <div style="font-size: 13px; color: #8B8680;">早班/晚班</div>
            <div class="stat-value" id="halfDayCount">0</div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div id="modalDept">香灯组</div>
                <div id="modalDate" style="font-size: 14px; opacity: 0.9;"></div>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <div id="currentStaffList"></div>
                <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
                    <input type="text" class="text-input" id="staffName" placeholder="输入姓名">
                    <div id="timeOptions">
                        <div class="time-option selected" data-time="9:00-17:00" onclick="selectTime(this)">9:00-17:00 (全天)</div>
                        <div class="time-option" data-time="9:00-13:30" onclick="selectTime(this)">9:00-13:30 (早班)</div>
                        <div class="time-option" data-time="13:30-17:00" onclick="selectTime(this)">13:30-17:00 (晚班)</div>
                    </div>
                    <button class="add-btn" onclick="addStaff()">确认添加</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Supabase 配置 ---
        const SUPABASE_URL = 'https://twqsxsunfzowgnkgxlql.supabase.co/';
        const SUPABASE_KEY = 'sb_publishable_eHhla4Ak7Uf3PXKuaW_hCA_Y09dxP01';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentDate = new Date(2026, 3, 1);
        let selectedDate = null;
        let selectedTime = "9:00-17:00";
        let windowSchedule = {}; // 存储当前部门当月的云端数据缓存

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderCalendar();
            document.getElementById('deptSelect').addEventListener('change', function() {
                document.getElementById('deptName').textContent = this.value;
                document.getElementById('modalDept').textContent = this.value;
                renderCalendar();
            });
        });

        // 核心：从云端获取数据
        async function fetchMonthData() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            const dept = document.getElementById('deptSelect').value;

            const { data, error } = await supabaseClient
                .from('schedule_data')
                .select('*')
                .eq('dept_name', dept)
                .like('date_key', `${year}-${month}-%`);

            if (error) {
                console.error("Fetch Error:", error);
                return {};
            }

            const formatted = {};
            data.forEach(item => {
                if (!formatted[item.date_key]) formatted[item.date_key] = [];
                formatted[item.date_key].push({
                    id: item.id,
                    name: item.staff_name,
                    time: item.shift_time
                });
            });
            return formatted;
        }

        async function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '<div style="grid-column: span 7; text-align: center; padding: 40px; color: #8B7355;">加载云端数据中...</div>';
            
            windowSchedule = await fetchMonthData();
            grid.innerHTML = '';

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('currentMonth').textContent = `${year}年${month + 1}月`;

            const firstDay = new Date(year, month, 1);
            let startDay = firstDay.getDay();
            if (startDay === 0) startDay = 7;
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < startDay - 1; i++) {
                grid.appendChild(document.createElement('div'));
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateKey = `${year}-${month + 1}-${day}`;
                const date = new Date(year, month, day);
                const isMonday = date.getDay() === 1;

                const cell = document.createElement('div');
                cell.className = `calendar-day ${isMonday ? 'closed' : ''}`;
                cell.onclick = () => !isMonday && openModal(date);

                const header = document.createElement('div');
                header.className = 'day-header';
                header.innerHTML = `<div class="day-number">${day}</div>`;
                if (isMonday) header.innerHTML += `<div class="day-label">闭馆</div>`;
                cell.appendChild(header);

                if (!isMonday) {
                    const dayData = windowSchedule[dateKey] || [];
                    const listCont = document.createElement('div');
                    listCont.className = 'staff-list';
                    dayData.forEach(s => {
                        const item = document.createElement('div');
                        const isHalf = s.time !== '9:00-17:00';
                        item.className = `staff-item ${isHalf ? 'halftime' : 'fulltime'}`;
                        item.innerHTML = `<span>${s.name}</span><span class="staff-time">${s.time}</span>`;
                        listCont.appendChild(item);
                    });
                    cell.appendChild(listCont);
                    
                    const hint = document.createElement('div');
                    hint.className = 'add-hint';
                    hint.textContent = '+';
                    cell.appendChild(hint);
                }
                grid.appendChild(cell);
            }
            updateStats();
        }

        async function addStaff() {
            const name = document.getElementById('staffName').value.trim();
            if (!name) return alert("请输入姓名");

            const dateKey = `${selectedDate.getFullYear()}-${selectedDate.getMonth() + 1}-${selectedDate.getDate()}`;
            const dept = document.getElementById('deptSelect').value;

            const { error } = await supabaseClient
                .from('schedule_data')
                .insert([{
                    date_key: dateKey,
                    dept_name: dept,
                    staff_name: name,
                    shift_time: selectedTime
                }]);

            if (error) {
                alert("保存失败：" + error.message);
            } else {
                document.getElementById('staffName').value = '';
                await renderCalendar();
                renderStaffList();
            }
        }

        async function deleteStaff(id) {
            if (!confirm("确定删除该排班吗？")) return;
            const { error } = await supabaseClient
                .from('schedule_data')
                .delete()
                .eq('id', id);

            if (error) alert("删除失败");
            else {
                await renderCalendar();
                renderStaffList();
            }
        }

        function renderStaffList() {
            const dateKey = `${selectedDate.getFullYear()}-${selectedDate.getMonth() + 1}-${selectedDate.getDate()}`;
            const dayData = windowSchedule[dateKey] || [];
            const container = document.getElementById('currentStaffList');
            
            if (dayData.length === 0) {
                container.innerHTML = '<div style="color: #999; text-align: center; padding: 10px;">暂无安排</div>';
            } else {
                container.innerHTML = dayData.map(s => `
                    <div class="staff-entry">
                        <div><strong>${s.name}</strong> <small style="color:#888">${s.time}</small></div>
                        <button class="delete-btn" onclick="deleteStaff(${s.id})">×</button>
                    </div>
                `).join('');
            }
        }

        function updateStats() {
            let total = 0, full = 0, half = 0;
            Object.values(windowSchedule).forEach(dayArr => {
                dayArr.forEach(s => {
                    total++;
                    if (s.time === '9:00-17:00') full++;
                    else half++;
                });
            });
            document.getElementById('totalStaff').textContent = total;
            document.getElementById('fullDayCount').textContent = full;
            document.getElementById('halfDayCount').textContent = half;
        }

        function openModal(date) {
            selectedDate = date;
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            document.getElementById('modalDate').textContent = `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日 星期${weekdays[date.getDay()]}`;
            renderStaffList();
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
        function selectTime(el) {
            document.querySelectorAll('.time-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            selectedTime = el.dataset.time;
        }
        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendar();
        }
    </script>
</body>
</html>
