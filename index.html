<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星云文教馆值班管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #8B7355;
            --primary-dark: #6B5344;
            --primary-light: #A68B6A;
            --bg-color: #FDFCF8;
            --text-color: #4A4A4A;
            --text-light: #8B8680;
            --border-color: #E8E4DC;
            --shadow: 0 4px 20px rgba(107, 83, 68, 0.08);
            --shadow-hover: 0 8px 30px rgba(107, 83, 68, 0.15);
            --fulltime-color: #4A4A4A;
            --halftime-color: #999999;
        }

        body {
            font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", "STSong", serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(139, 115, 85, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(139, 115, 85, 0.03) 0%, transparent 50%);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* 头部区域 */
        .header {
            text-align: center;
            padding: 40px 20px 30px;
            position: relative;
        }

        .dept-selector {
            display: inline-block;
            position: relative;
            margin-bottom: 15px;
        }

        .dept-select {
            appearance: none;
            -webkit-appearance: none;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 12px 40px 12px 25px;
            font-size: 16px;
            color: var(--primary-dark);
            font-family: inherit;
            cursor: pointer;
            box-shadow: var(--shadow);
            min-width: 160px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .dept-select:hover {
            box-shadow: var(--shadow-hover);
            border-color: var(--primary-light);
        }

        .dept-selector::after {
            content: "▼";
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-color);
            font-size: 10px;
            pointer-events: none;
        }

        .subtitle {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 8px;
            letter-spacing: 2px;
        }

        .main-title {
            font-size: 32px;
            font-weight: 400;
            color: var(--primary-dark);
            margin: 25px 0 15px;
            letter-spacing: 4px;
            position: relative;
            display: inline-block;
        }

        .main-title::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
        }

        .motto {
            font-size: 16px;
            color: var(--text-light);
            margin-top: 25px;
            letter-spacing: 3px;
        }

        /* 日历容器 */
        .calendar-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            padding: 15px 0;
            font-size: 14px;
            color: var(--text-light);
            border-bottom: 1px solid var(--border-color);
            font-weight: 500;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            padding: 15px 0;
        }

        .calendar-day {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            min-height: 100px;
            display: flex;
            flex-direction: column;
        }

        .calendar-day:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
            border-color: var(--primary-light);
        }

        .calendar-day.closed {
            background: #F5F5F5;
            cursor: default;
            opacity: 0.7;
        }

        .calendar-day.closed:hover {
            transform: none;
            box-shadow: none;
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .day-number {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-color);
        }

        .calendar-day.closed .day-number {
            color: var(--text-light);
        }

        .day-label {
            font-size: 11px;
            color: var(--primary-color);
            background: rgba(139, 115, 85, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .staff-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
            justify-content: flex-start;
        }

        .staff-item {
            font-size: 13px;
            padding: 3px 6px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* 全天值班 - 深色 */
        .staff-item.fulltime {
            color: var(--fulltime-color);
            font-weight: 500;
            background: rgba(139, 115, 85, 0.08);
        }

        /* 半天值班 - 灰色 */
        .staff-item.halftime {
            color: var(--halftime-color);
            background: rgba(139, 115, 85, 0.04);
        }

        .staff-time {
            font-size: 10px;
            color: var(--text-light);
            margin-left: auto;
        }

        /* +号按钮 - 默认隐藏，悬停/点击时左侧显示 */
        .add-hint {
            position: absolute;
            bottom: 6px;
            left: 8px;
            width: 22px;
            height: 22px;
            background: var(--primary-color);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 10;
        }

        .calendar-day:hover .add-hint,
        .calendar-day:active .add-hint {
            opacity: 1;
        }

        .calendar-day.closed .add-hint {
            display: none;
        }

        /* 统计卡片 */
        .stats-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 15px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }

        .stat-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px 15px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 500;
            color: var(--primary-dark);
            font-family: "Noto Sans SC", sans-serif;
        }

        .stat-unit {
            font-size: 12px;
            color: var(--text-light);
            margin-left: 2px;
        }

        /* 底部区域 */
        .footer-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 15px 40px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: flex-end;
            gap: 20px;
        }

        .notes {
            flex: 1;
            min-width: 250px;
        }

        .note-text {
            font-size: 13px;
            color: var(--text-light);
            font-style: italic;
            line-height: 1.8;
            margin-bottom: 5px;
        }

        .print-btn {
            background: var(--primary-dark);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            font-family: inherit;
            box-shadow: 0 4px 15px rgba(107, 83, 68, 0.3);
        }

        .print-btn:hover {
            background: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(107, 83, 68, 0.4);
        }

        .print-icon {
            width: 16px;
            height: 16px;
        }

        .copyright {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: var(--text-light);
            border-top: 1px solid var(--border-color);
            margin-top: 20px;
        }

        /* 弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(3px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            max-height: 90vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: modalSlide 0.3s ease;
        }

        @keyframes modalSlide {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            background: var(--primary-color);
            color: white;
            padding: 20px 25px;
            position: relative;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .modal-date {
            font-size: 14px;
            opacity: 0.9;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .modal-body {
            padding: 25px;
            overflow-y: auto;
            max-height: calc(90vh - 140px);
        }

        .current-staff {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 14px;
            color: var(--primary-color);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .staff-entry {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .staff-info {
            flex: 1;
        }

        .staff-name {
            font-size: 16px;
            color: var(--text-color);
            margin-bottom: 3px;
        }

        .staff-shift {
            font-size: 12px;
            color: var(--text-light);
        }

        .delete-btn {
            width: 28px;
            height: 28px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 50%;
            color: #999;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .delete-btn:hover {
            border-color: #ff4444;
            color: #ff4444;
            background: #fff5f5;
        }

        .add-section {
            margin-top: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-label {
            display: block;
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 6px;
        }

        .text-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .text-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .time-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .time-option {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .time-option:hover {
            border-color: var(--primary-light);
            background: rgba(139, 115, 85, 0.02);
        }

        .time-option.selected {
            border-color: var(--primary-color);
            background: rgba(139, 115, 85, 0.08);
        }

        .time-radio {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .time-option.selected .time-radio {
            border-color: var(--primary-color);
        }

        .time-option.selected .time-radio::after {
            content: "";
            width: 8px;
            height: 8px;
            background: var(--primary-color);
            border-radius: 50%;
        }

        .time-text {
            flex: 1;
            font-size: 15px;
            color: var(--text-color);
        }

        .time-icon {
            width: 16px;
            height: 16px;
            color: var(--primary-color);
            opacity: 0;
        }

        .time-option.selected .time-icon {
            opacity: 1;
        }

        .add-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 20px;
            font-family: inherit;
            transition: background 0.3s;
        }

        .add-btn:hover {
            background: var(--primary-dark);
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: var(--text-light);
            font-size: 14px;
        }

        /* 月份导航 */
        .month-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
            padding: 0 15px;
        }

        .nav-btn {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .current-month {
            font-size: 18px;
            color: var(--primary-dark);
            font-weight: 500;
            min-width: 120px;
            text-align: center;
        }

        /* 响应式优化 */
        @media (max-width: 768px) {
            .header {
                padding: 30px 15px 20px;
            }

            .main-title {
                font-size: 22px;
                letter-spacing: 2px;
            }

            .motto {
                font-size: 13px;
                letter-spacing: 2px;
            }

            .calendar-grid {
                gap: 4px;
                padding: 10px 0;
            }

            .calendar-day {
                min-height: 90px;
                padding: 6px;
                border-radius: 6px;
            }

            .day-header {
                margin-bottom: 4px;
            }

            .day-number {
                font-size: 14px;
            }

            .day-label {
                font-size: 9px;
                padding: 1px 4px;
            }

            /* 手机端：名字全显示，确保三人可见 */
            .staff-list {
                gap: 2px;
            }

            .staff-item {
                font-size: 12px;
                padding: 2px 4px;
                white-space: normal;
                line-height: 1.2;
                overflow: visible;
                text-overflow: clip;
            }

            .staff-time {
                display: none;
            }

            /* +号按钮手机端左侧显示 */
            .add-hint {
                left: 6px;
                bottom: 6px;
                width: 20px;
                height: 20px;
                font-size: 14px;
            }

            .calendar-header {
                font-size: 12px;
                padding: 10px 0;
            }

            .stats-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .stat-card {
                padding: 15px 10px;
            }

            .stat-value {
                font-size: 22px;
            }

            .footer-section {
                flex-direction: column;
                align-items: stretch;
            }

            .print-btn {
                width: 100%;
                justify-content: center;
            }

            .modal {
                max-height: 95vh;
            }

            .modal-body {
                padding: 20px;
            }
        }

        @media (max-width: 480px) {
            .calendar-grid {
                gap: 3px;
            }

            .calendar-day {
                min-height: 85px;
                padding: 5px;
            }

            .staff-item {
                font-size: 11px;
                padding: 2px 3px;
            }

            .day-number {
                font-size: 13px;
            }
        }

        /* 打印样式 */
        @media print {
            body {
                background: white;
            }

            .header, .stats-container, .footer-section, .modal-overlay {
                display: none;
            }

            .calendar-container {
                padding: 0;
            }

            .calendar-day {
                break-inside: avoid;
                border: 1px solid #ccc;
            }

            .calendar-day.closed {
                background: #f0f0f0;
            }

            .add-hint {
                display: none !important;
            }
        }

        /* 动画效果 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .calendar-day {
            animation: fadeIn 0.5s ease backwards;
        }

        .calendar-day:nth-child(1) { animation-delay: 0.01s; }
        .calendar-day:nth-child(2) { animation-delay: 0.02s; }
        .calendar-day:nth-child(3) { animation-delay: 0.03s; }
        .calendar-day:nth-child(4) { animation-delay: 0.04s; }
        .calendar-day:nth-child(5) { animation-delay: 0.05s; }
        .calendar-day:nth-child(6) { animation-delay: 0.06s; }
        .calendar-day:nth-child(7) { animation-delay: 0.07s; }
    </style>
<base target="_blank">
</head>
<body>
    <!-- 头部 -->
    <header class="header">
        <div class="dept-selector">
            <select class="dept-select" id="deptSelect">
                <option value="香灯组">香灯组</option>
                <option value="美术馆">美术馆</option>
                <option value="图书馆">图书馆</option>
                <option value="非遗组">非遗组</option>
                <option value="大寮">大寮</option>
                <option value="迎宾组">迎宾组</option>
            </select>
        </div>
        <div class="subtitle">切换部门查看排班</div>
        
        <h1 class="main-title">文教馆<span id="deptName">香灯组</span>值班管理</h1>
        <div class="motto">说好话 · 做好事 · 存好心</div>
    </header>

    <!-- 月份导航 -->
    <div class="month-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
        <div class="current-month" id="currentMonth">2026年4月</div>
        <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>

    <!-- 日历 -->
    <div class="calendar-container">
        <div class="calendar-header">
            <div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div><div>日</div>
        </div>
        <div class="calendar-grid" id="calendarGrid">
            <!-- 日历格子由JS生成 -->
        </div>
    </div>

    <!-- 统计 -->
    <div class="stats-container">
        <div class="stat-card">
            <div class="stat-label">本月值班人数</div>
            <div class="stat-value"><span id="totalStaff">0</span><span class="stat-unit">人</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">全天值班</div>
            <div class="stat-value"><span id="fullDayCount">0</span><span class="stat-unit">人次</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">早班值班</div>
            <div class="stat-value"><span id="morningCount">0</span><span class="stat-unit">人次</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">晚班值班</div>
            <div class="stat-value"><span id="afternoonCount">0</span><span class="stat-unit">人次</span></div>
        </div>
    </div>

    <!-- 底部 -->
    <div class="footer-section">
        <div class="notes">
            <div class="note-text">注：每周一为美术馆闭馆日，无需安排值班人员。</div>
            <div class="note-text">默认值班时间为全天（9:00-17:00）。</div>
        </div>
        <button class="print-btn" onclick="printSchedule()">
            <svg class="print-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
                <path d="M6 14h12v8H6z"/>
            </svg>
            打印当前值班表
        </button>
    </div>

    <div class="copyright">© 2026 星云文教馆值班管理系统</div>

    <!-- 弹窗 -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div class="modal-title"><span id="modalDept">香灯组</span> 值班安排</div>
                <div class="modal-date" id="modalDate">2026年04月30日 星期四</div>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="current-staff">
                    <div class="section-title">当前人员</div>
                    <div id="currentStaffList">
                        <div class="empty-state">暂无值班人员</div>
                    </div>
                </div>
                
                <div class="add-section">
                    <div class="section-title">添加人员</div>
                    <div class="input-group">
                        <label class="input-label">姓名</label>
                        <input type="text" class="text-input" id="staffName" placeholder="请输入姓名">
                    </div>
                    
                    <div class="input-group">
                        <label class="input-label">时间段（可自行修改数字）</label>
                        <div class="time-options">
                            <div class="time-option selected" data-time="9:00-17:00" onclick="selectTime(this)">
                                <div class="time-radio"></div>
                                <div class="time-text">9:00-17:00（全天）</div>
                                <svg class="time-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="20 6 9 17 4 12"/>
                                </svg>
                            </div>
                            <div class="time-option" data-time="9:00-13:30" onclick="selectTime(this)">
                                <div class="time-radio"></div>
                                <div class="time-text">9:00-13:30（早班）</div>
                                <svg class="time-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="20 6 9 17 4 12"/>
                                </svg>
                            </div>
                            <div class="time-option" data-time="13:30-17:00" onclick="selectTime(this)">
                                <div class="time-radio"></div>
                                <div class="time-text">13:30-17:00（晚班）</div>
                                <svg class="time-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="20 6 9 17 4 12"/>
                                </svg>
                            </div>
                        </div>
                    </div>
                    
                    <button class="add-btn" onclick="addStaff()">确认添加</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 数据存储
        let currentDate = new Date(2026, 3, 1); // 2026年4月
        let selectedDate = null;
        let selectedTime = "9:00-17:00";
        
        // 模拟数据存储（实际应用中应使用localStorage或后端API）
        let scheduleData = JSON.parse(localStorage.getItem('museumSchedule')) || {};
        
        const departments = {
            '香灯组': '香灯组',
            '美术馆': '美术馆',
            '图书馆': '图书馆',
            '非遗组': '非遗组',
            '大寮': '大寮',
            '迎宾组': '迎宾组'
        };

        const timeSlots = {
            '9:00-17:00': '全天',
            '9:00-13:30': '早班',
            '13:30-17:00': '晚班'
        };

        // 判断是否为半天班
        function isHalfTime(time) {
            return time === '9:00-13:30' || time === '13:30-17:00';
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderCalendar();
            updateStats();
            
            // 部门切换
            document.getElementById('deptSelect').addEventListener('change', function() {
                document.getElementById('deptName').textContent = this.value;
                document.getElementById('modalDept').textContent = this.value;
                renderCalendar();
                updateStats();
            });

            // 回车键添加
            document.getElementById('staffName').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') addStaff();
            });
        });

        function getMonthData(year, month) {
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const daysInMonth = lastDay.getDate();
            
            // 获取第一天是星期几（0=周日，1=周一）
            let startDay = firstDay.getDay();
            if (startDay === 0) startDay = 7; // 周日转为7
            
            return { daysInMonth, startDay: startDay - 1 }; // 转为0=周一的索引
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const { daysInMonth, startDay } = getMonthData(year, month);
            
            // 更新月份显示
            document.getElementById('currentMonth').textContent = 
                `${year}年${month + 1}月`;
            
            const dept = document.getElementById('deptSelect').value;
            
            // 填充空白
            for (let i = 0; i < startDay; i++) {
                const empty = document.createElement('div');
                grid.appendChild(empty);
            }
            
            // 生成日期
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                const dayOfWeek = date.getDay(); // 0=周日，1=周一
                const isMonday = dayOfWeek === 1;
                const dateKey = `${year}-${month + 1}-${day}`;
                
                const cell = document.createElement('div');
                cell.className = `calendar-day ${isMonday ? 'closed' : ''}`;
                cell.onclick = () => !isMonday && openModal(date);
                
                // 日期头部（数字+标签）
                const dayHeader = document.createElement('div');
                dayHeader.className = 'day-header';
                
                const dayNum = document.createElement('div');
                dayNum.className = 'day-number';
                dayNum.textContent = day;
                dayHeader.appendChild(dayNum);
                
                if (isMonday) {
                    const label = document.createElement('div');
                    label.className = 'day-label';
                    label.textContent = '闭馆';
                    dayHeader.appendChild(label);
                }
                
                cell.appendChild(dayHeader);
                
                if (!isMonday) {
                    // 显示已安排的人员
                    const dayData = scheduleData[dateKey] || {};
                    const deptData = dayData[dept] || [];
                    
                    if (deptData.length > 0) {
                        cell.classList.add('has-staff');
                        const staffList = document.createElement('div');
                        staffList.className = 'staff-list';
                        
                        deptData.forEach(staff => {
                            const item = document.createElement('div');
                            item.className = 'staff-item';
                            
                            // 根据时长设置颜色类名
                            if (isHalfTime(staff.time)) {
                                item.classList.add('halftime');
                            } else {
                                item.classList.add('fulltime');
                            }
                            
                            item.innerHTML = `
                                <span>${staff.name}</span>
                                <span class="staff-time">${staff.time}</span>
                            `;
                            staffList.appendChild(item);
                        });
                        
                        cell.appendChild(staffList);
                    }
                    
                    // +号按钮 - 左侧显示
                    const hint = document.createElement('div');
                    hint.className = 'add-hint';
                    hint.textContent = '+';
                    cell.appendChild(hint);
                }
                
                grid.appendChild(cell);
            }
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendar();
            updateStats();
        }

        function openModal(date) {
            selectedDate = date;
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            const weekday = weekdays[date.getDay()];
            
            document.getElementById('modalDate').textContent = 
                `${year}年${month.toString().padStart(2, '0')}月${day.toString().padStart(2, '0')}日 星期${weekday}`;
            
            renderStaffList();
            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('staffName').value = '';
            document.getElementById('staffName').focus();
        }

        function closeModal(event) {
            if (!event || event.target === document.getElementById('modalOverlay')) {
                document.getElementById('modalOverlay').classList.remove('active');
            }
        }

        function renderStaffList() {
            const dateKey = `${selectedDate.getFullYear()}-${selectedDate.getMonth() + 1}-${selectedDate.getDate()}`;
            const dept = document.getElementById('deptSelect').value;
            const dayData = scheduleData[dateKey] || {};
            const deptData = dayData[dept] || [];
            
            const container = document.getElementById('currentStaffList');
            
            if (deptData.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无值班人员</div>';
            } else {
                container.innerHTML = '';
                deptData.forEach((staff, index) => {
                    const entry = document.createElement('div');
                    entry.className = 'staff-entry';
                    entry.innerHTML = `
                        <div class="staff-info">
                            <div class="staff-name">${staff.name}</div>
                            <div class="staff-shift">${staff.time} (${timeSlots[staff.time]})</div>
                        </div>
                        <button class="delete-btn" onclick="deleteStaff(${index})">×</button>
                    `;
                    container.appendChild(entry);
                });
            }
        }

        function selectTime(element) {
            document.querySelectorAll('.time-option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            selectedTime = element.dataset.time;
        }

        function addStaff() {
            const name = document.getElementById('staffName').value.trim();
            if (!name) {
                alert('请输入姓名');
                return;
            }
            
            const dateKey = `${selectedDate.getFullYear()}-${selectedDate.getMonth() + 1}-${selectedDate.getDate()}`;
            const dept = document.getElementById('deptSelect').value;
            
            if (!scheduleData[dateKey]) {
                scheduleData[dateKey] = {};
            }
            if (!scheduleData[dateKey][dept]) {
                scheduleData[dateKey][dept] = [];
            }
            
            // 限制每天最多3人
            if (scheduleData[dateKey][dept].length >= 3) {
                alert('每天最多安排3位值班人员');
                return;
            }
            
            scheduleData[dateKey][dept].push({
                name: name,
                time: selectedTime
            });
            
            // 保存到本地存储
            localStorage.setItem('museumSchedule', JSON.stringify(scheduleData));
            
            renderStaffList();
            renderCalendar();
            updateStats();
            
            document.getElementById('staffName').value = '';
            
            // 成功提示动画
            const btn = document.querySelector('.add-btn');
            const originalText = btn.textContent;
            btn.textContent = '添加成功 ✓';
            btn.style.background = '#5a8f5a';
            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = '';
            }, 1000);
        }

        function deleteStaff(index) {
            const dateKey = `${selectedDate.getFullYear()}-${selectedDate.getMonth() + 1}-${selectedDate.getDate()}`;
            const dept = document.getElementById('deptSelect').value;
            
            scheduleData[dateKey][dept].splice(index, 1);
            
            if (scheduleData[dateKey][dept].length === 0) {
                delete scheduleData[dateKey][dept];
            }
            if (Object.keys(scheduleData[dateKey]).length === 0) {
                delete scheduleData[dateKey];
            }
            
            localStorage.setItem('museumSchedule', JSON.stringify(scheduleData));
            
            renderStaffList();
            renderCalendar();
            updateStats();
        }

        function updateStats() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            const dept = document.getElementById('deptSelect').value;
            
            let totalStaff = 0;
            let fullDay = 0;
            let morning = 0;
            let afternoon = 0;
            
            // 遍历当月所有日期
            const daysInMonth = new Date(year, month, 0).getDate();
            for (let day = 1; day <= daysInMonth; day++) {
                const dateKey = `${year}-${month}-${day}`;
                const dayData = scheduleData[dateKey] || {};
                const deptData = dayData[dept] || [];
                
                deptData.forEach(staff => {
                    totalStaff++;
                    if (staff.time === '9:00-17:00') fullDay++;
                    else if (staff.time === '9:00-13:30') morning++;
                    else if (staff.time === '13:30-17:00') afternoon++;
                });
            }
            
            // 动画更新数字
            animateNumber('totalStaff', totalStaff);
            animateNumber('fullDayCount', fullDay);
            animateNumber('morningCount', morning);
            animateNumber('afternoonCount', afternoon);
        }

        function animateNumber(id, target) {
            const element = document.getElementById(id);
            const current = parseInt(element.textContent);
            const diff = target - current;
            if (diff === 0) return;
            
            const steps = 10;
            const stepValue = diff / steps;
            let step = 0;
            
            const timer = setInterval(() => {
                step++;
                element.textContent = Math.round(current + stepValue * step);
                if (step >= steps) {
                    element.textContent = target;
                    clearInterval(timer);
                }
            }, 30);
        }

        function printSchedule() {
            window.print();
        }

        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
